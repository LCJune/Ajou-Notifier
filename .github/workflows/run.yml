name: Ajou Notifier Bot

on:
  schedule:
    - cron: '30 1 * * *' # 매일 아침 10시 30분(KST)
  workflow_dispatch: # 수동 실행 버튼

permissions: # [중요] 이 워크플로우에 쓰기 권한을 직접 부여합니다.
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run main script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py || echo "Network error occurred, but continuing..."
      
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CALENDAR_DB.txt SW_DB.txt SCHOLAR_DB.txt
          # 변경사항이 없을 때 에러가 나지 않도록 처리
          git diff --quiet && git diff --staged --quiet || (git commit -m "📢 Update: 알림 로그 및 txt 파일 갱신" && git push)
