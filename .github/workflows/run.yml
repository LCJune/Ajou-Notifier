name: Ajou Notifier Bot

on:
  schedule:
    - cron: '30 1 * * *' # 매일 아침 10시 30분(KST)
  workflow_dispatch: # 수동 실행 버튼

permissions: # [중요] 이 워크플로우에 쓰기 권한을 직접 부여함
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run main script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py || echo "Network error occurred, but continuing..."
      
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add database/sqliteNotice.db

          # 변경 사항이 있을 시 DB 업데이트
          if ! git diff --cached --quiet; then
              git commit -m "알림 및 DB 갱신"
              git push
          fi #if 문 닫을 때 fi를 써야함 

          
